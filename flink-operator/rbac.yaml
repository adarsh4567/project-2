apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: redis
  name: redis-access-role
rules:
- apiGroups: [""]
  resources: ["services", "endpoints"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-redis-access
  namespace: redis
subjects:
- kind: ServiceAccount
  name: flink-service-account
  namespace: flink
roleRef:
  kind: Role
  name: redis-access-role
  apiGroup: rbac.authorization.k8s.io